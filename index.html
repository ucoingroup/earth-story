<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EACO Earth Story | 地球正能量故事</title>
    <meta name="description" content="Daily positive energy stories from around the world in 10 languages">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a1a;
            --card-bg: #12122a;
            --text: #e8e8f0;
            --text-dim: #8888aa;
            --accent: #6c5ce7;
            --accent2: #00cec9;
            --gold: #feca57;
            --border: #2a2a4a;
            --gradient: linear-gradient(135deg, #6c5ce7, #00cec9);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', 'Noto Sans KR', 'Noto Sans JP', 'Noto Sans Arabic', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            background: radial-gradient(2px 2px at 20px 30px, #ffffff33, transparent),
                        radial-gradient(2px 2px at 40px 70px, #ffffff22, transparent),
                        radial-gradient(1px 1px at 90px 40px, #ffffff44, transparent),
                        radial-gradient(1px 1px at 130px 80px, #ffffff22, transparent),
                        radial-gradient(2px 2px at 160px 30px, #ffffff33, transparent);
            background-size: 200px 100px;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; position: relative; z-index: 1; }
        
        /* Header */
        .header {
            text-align: center; padding: 40px 20px 30px;
            background: linear-gradient(180deg, rgba(108,92,231,0.15), transparent);
            border-radius: 20px; margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.2em; background: var(--gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 10px;
        }
        .header .subtitle { color: var(--text-dim); font-size: 1em; }
        .logo { font-size: 3em; margin-bottom: 10px; }
        
        /* Language selector */
        .lang-bar {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
            padding: 15px; background: var(--card-bg); border-radius: 12px;
            margin-bottom: 25px; border: 1px solid var(--border);
        }
        .lang-btn {
            padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px;
            background: transparent; color: var(--text-dim); cursor: pointer;
            font-size: 0.85em; transition: all 0.3s;
        }
        .lang-btn:hover, .lang-btn.active {
            background: var(--gradient); color: #fff; border-color: transparent;
        }
        
        /* Date navigation */
        .date-nav {
            display: flex; justify-content: center; align-items: center; gap: 15px;
            margin-bottom: 25px;
        }
        .date-nav button {
            padding: 8px 20px; border: 1px solid var(--border); border-radius: 10px;
            background: var(--card-bg); color: var(--text); cursor: pointer;
            font-size: 0.9em; transition: all 0.3s;
        }
        .date-nav button:hover { background: var(--accent); color: #fff; }
        .date-nav .current-date {
            font-size: 1.1em; color: var(--gold); font-weight: 600;
        }
        
        /* Story cards */
        .story-grid { display: flex; flex-direction: column; gap: 20px; }
        .story-card {
            background: var(--card-bg); border-radius: 16px; padding: 25px;
            border: 1px solid var(--border); transition: all 0.3s;
            position: relative; overflow: hidden;
        }
        .story-card:hover {
            border-color: var(--accent); transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(108,92,231,0.15);
        }
        .story-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: var(--gradient); opacity: 0; transition: opacity 0.3s;
        }
        .story-card:hover::before { opacity: 1; }
        .story-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; flex-wrap: wrap; gap: 10px;
        }
        .story-location {
            font-size: 1em; color: var(--accent2); font-weight: 600;
        }
        .story-energy {
            padding: 4px 12px; border-radius: 20px; font-size: 0.85em;
            font-weight: 600;
        }
        .energy-high { background: rgba(254,202,87,0.15); color: var(--gold); }
        .energy-mid { background: rgba(0,206,201,0.15); color: var(--accent2); }
        .energy-low { background: rgba(136,136,170,0.15); color: var(--text-dim); }
        .story-theme {
            font-size: 0.8em; padding: 3px 10px; border-radius: 6px;
            background: rgba(108,92,231,0.15); color: var(--accent);
            margin-bottom: 12px; display: inline-block;
        }
        .story-body {
            color: var(--text); font-size: 0.95em; line-height: 1.8;
            margin-bottom: 15px; white-space: pre-line;
        }
        .story-reflection {
            background: rgba(0,206,201,0.05); border-left: 3px solid var(--accent2);
            padding: 12px 15px; border-radius: 0 8px 8px 0; font-size: 0.9em;
            color: var(--text-dim); line-height: 1.7;
        }
        .story-reflection strong { color: var(--accent2); }
        
        /* Footer message */
        .daily-message {
            text-align: center; padding: 25px; margin-top: 30px;
            background: linear-gradient(135deg, rgba(108,92,231,0.1), rgba(0,206,201,0.1));
            border-radius: 16px; border: 1px solid var(--border);
        }
        .daily-message p { color: var(--gold); font-size: 1em; line-height: 1.8; }
        .daily-message .eaco-brand {
            margin-top: 15px; font-size: 0.9em; color: var(--text-dim);
        }
        
        /* Footer */
        .footer {
            text-align: center; padding: 30px 20px; margin-top: 20px;
            border-top: 1px solid var(--border); color: var(--text-dim);
            font-size: 0.85em;
        }
        .footer a { color: var(--accent2); text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
        
        /* Calendar panel */
        .calendar-panel {
            background: var(--card-bg); border-radius: 16px; padding: 20px;
            margin-bottom: 25px; border: 1px solid var(--border);
            display: none;
        }
        .calendar-panel.show { display: block; }
        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
            margin-top: 15px;
        }
        .cal-day {
            padding: 8px; text-align: center; border-radius: 8px;
            cursor: pointer; font-size: 0.85em; color: var(--text-dim);
        }
        .cal-day:hover { background: var(--accent); color: #fff; }
        .cal-day.has-stories { color: var(--accent2); font-weight: 600; }
        .cal-day.today { border: 2px solid var(--gold); }
        .cal-header { text-align: center; color: var(--text-dim); font-size: 0.8em; }
        
        /* Archive link */
        .archive-section {
            background: var(--card-bg); border-radius: 16px; padding: 20px;
            margin-top: 30px; border: 1px solid var(--border); text-align: center;
        }
        .archive-section h3 { color: var(--accent2); margin-bottom: 15px; }
        .archive-grid {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
        }
        .archive-link {
            padding: 6px 14px; background: rgba(108,92,231,0.1);
            border: 1px solid var(--border); border-radius: 8px;
            color: var(--text); text-decoration: none; font-size: 0.85em;
            transition: all 0.3s;
        }
        .archive-link:hover {
            background: var(--accent); color: #fff; border-color: transparent;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .header h1 { font-size: 1.6em; }
            .story-card { padding: 18px; }
            .container { padding: 12px; }
        }
        
        /* Loading */
        .loading { text-align: center; padding: 60px; color: var(--text-dim); }
        .loading .spinner {
            display: inline-block; width: 40px; height: 40px;
            border: 3px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Direction for RTL languages */
        [dir="rtl"] { text-align: right; }
        [dir="rtl"] .story-reflection { border-left: none; border-right: 3px solid var(--accent2); border-radius: 8px 0 0 8px; }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="container" id="app">
        <div class="header">
            <div class="logo">🌍</div>
            <h1 id="site-title">EACO Earth Story</h1>
            <p class="subtitle" id="site-subtitle">Daily positive energy stories from around the world</p>
        </div>
        
        <div class="lang-bar" id="lang-bar"></div>
        
        <div class="date-nav">
            <button id="btn-prev" onclick="changeDate(-1)">←</button>
            <span class="current-date" id="current-date"></span>
            <button id="btn-next" onclick="changeDate(1)">→</button>
            <button id="btn-today" onclick="goToday()">📅 Today</button>
        </div>
        
        <div id="stories-container" class="story-grid">
            <div class="loading"><div class="spinner"></div><p id="loading-text">Loading stories...</p></div>
        </div>
        
        <div id="daily-message" class="daily-message" style="display:none"></div>
        
        <div id="archive-section" class="archive-section" style="display:none">
            <h3 id="archive-title">📖 Story Archive</h3>
            <div class="archive-grid" id="archive-grid"></div>
        </div>
        
        <div class="footer">
            <p>EACO Earth Story — Connecting the world through positive energy 🌍</p>
            <p>
                <a href="https://linktr.ee/eacocc" target="_blank">EACO Official</a> · 
                <a href="https://github.com/ucoingroup/earth-story" target="_blank">GitHub</a> · 
                <a href="https://x.com/eacocc" target="_blank">Twitter</a>
            </p>
            <p style="margin-top:10px;font-size:0.8em;">Solana Contract: DqfoyZH96RnvZusSp3Cdncjpyp3C74ZmJzGhjmHnDHRH</p>
        </div>
    </div>

    <script>
    // ===== Configuration =====
    const LANGS = {
        en: { name: 'English', flag: '🇬🇧', dir: 'ltr' },
        zh: { name: '中文', flag: '🇨🇳', dir: 'ltr' },
        ru: { name: 'Русский', flag: '🇷🇺', dir: 'ltr' },
        fr: { name: 'Français', flag: '🇫🇷', dir: 'ltr' },
        es: { name: 'Español', flag: '🇪🇸', dir: 'ltr' },
        ar: { name: 'العربية', flag: '🇸🇦', dir: 'rtl' },
        vi: { name: 'Tiếng Việt', flag: '🇻🇳', dir: 'ltr' },
        ko: { name: '한국어', flag: '🇰🇷', dir: 'ltr' },
        ja: { name: '日本語', flag: '🇯🇵', dir: 'ltr' },
        ms: { name: 'Bahasa Melayu', flag: '🇲🇾', dir: 'ltr' }
    };

    const UI_TEXT = {
        en: { title: 'EACO Earth Story', subtitle: 'Daily positive energy stories from around the world', loading: 'Loading stories...', archive: '📖 Story Archive', today: '📅 Today' },
        zh: { title: 'EACO 地球正能量故事', subtitle: '来自世界各地的每日正能量故事', loading: '正在加载故事...', archive: '📖 故事归档', today: '📅 今天' },
        ru: { title: 'EACO Истории Земли', subtitle: 'Ежедневные истории позитивной энергии со всего мира', loading: 'Загрузка историй...', archive: '📖 Архив историй', today: '📅 Сегодня' },
        fr: { title: 'EACO Histoires de la Terre', subtitle: 'Histoires quotidiennes d\'énergie positive du monde entier', loading: 'Chargement des histoires...', archive: '📖 Archives', today: '📅 Aujourd\'hui' },
        es: { title: 'EACO Historias de la Tierra', subtitle: 'Historias diarias de energía positiva de todo el mundo', loading: 'Cargando historias...', archive: '📖 Archivo', today: '📅 Hoy' },
        ar: { title: 'EACO قصص الأرض', subtitle: 'قصص يومية للطاقة الإيجابية من أنحاء العالم', loading: 'جاري تحميل القصص...', archive: '📖 أرشيف القصص', today: '📅 اليوم' },
        vi: { title: 'EACO Câu Chuyện Trái Đất', subtitle: 'Câu chuyện năng lượng tích cực hàng ngày từ khắp nơi', loading: 'Đang tải câu chuyện...', archive: '📖 Kho lưu trữ', today: '📅 Hôm nay' },
        ko: { title: 'EACO 지구 이야기', subtitle: '세계 각지의 매일 긍정 에너지 이야기', loading: '이야기 로딩 중...', archive: '📖 이야기 보관함', today: '📅 오늘' },
        ja: { title: 'EACO 地球のポジティブストーリー', subtitle: '世界中からの毎日のポジティブエネルギー物語', loading: '読み込み中...', archive: '📖 ストーリーアーカイブ', today: '📅 今日' },
        ms: { title: 'EACO Cerita Bumi', subtitle: 'Cerita tenaga positif harian dari seluruh dunia', loading: 'Memuatkan cerita...', archive: '📖 Arkib Cerita', today: '📅 Hari ini' }
    };

    // ===== State =====
    let currentLang = localStorage.getItem('earthStoryLang') || 'en';
    let currentDate = new Date();

    // ===== Language Bar =====
    function renderLangBar() {
        const bar = document.getElementById('lang-bar');
        bar.innerHTML = Object.entries(LANGS).map(([code, lang]) =>
            `<button class="lang-btn ${code === currentLang ? 'active' : ''}" onclick="switchLang('${code}')">${lang.flag} ${lang.name}</button>`
        ).join('');
    }

    function switchLang(lang) {
        currentLang = lang;
        localStorage.setItem('earthStoryLang', lang);
        document.documentElement.lang = lang;
        document.documentElement.dir = LANGS[lang].dir;
        renderLangBar();
        loadStories();
    }

    // ===== Date Navigation =====
    function formatDate(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function formatDateDisplay(date) {
        const localeMap = { en: 'en-US', zh: 'zh-CN', ru: 'ru-RU', fr: 'fr-FR', es: 'es-ES', ar: 'ar-SA', vi: 'vi-VN', ko: 'ko-KR', ja: 'ja-JP', ms: 'ms-MY' };
        return date.toLocaleDateString(localeMap[currentLang] || 'en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }

    function changeDate(delta) {
        currentDate.setDate(currentDate.getDate() + delta);
        loadStories();
    }

    function goToday() {
        currentDate = new Date();
        loadStories();
    }

    function updateDateNav() {
        document.getElementById('current-date').textContent = formatDateDisplay(currentDate);
    }

    // ===== Load Stories =====
    async function loadStories() {
        const ui = UI_TEXT[currentLang] || UI_TEXT.en;
        document.getElementById('site-title').textContent = ui.title;
        document.getElementById('site-subtitle').textContent = ui.subtitle;
        document.getElementById('loading-text').textContent = ui.loading;
        document.getElementById('btn-today').textContent = ui.today;
        document.getElementById('archive-title').textContent = ui.archive;
        updateDateNav();

        const dateStr = formatDate(currentDate);
        const container = document.getElementById('stories-container');
        const msgContainer = document.getElementById('daily-message');

        container.innerHTML = `<div class="loading"><div class="spinner"></div><p>${ui.loading}</p></div>`;
        msgContainer.style.display = 'none';

        try {
            const resp = await fetch(`stories/${dateStr}/${dateStr}-${currentLang}.json`);
            if (!resp.ok) {
                // Try English fallback
                const fallback = await fetch(`stories/${dateStr}/${dateStr}-en.json`);
                if (!fallback.ok) throw new Error('No stories');
                const data = await fallback.json();
                renderStories(data, true);
            } else {
                const data = await resp.json();
                renderStories(data, false);
            }
            loadArchive();
        } catch (e) {
            container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-dim);">
                <p style="font-size:3em;">🌌</p>
                <p>Stories for this date are not yet available.</p>
                <p style="font-size:0.85em;margin-top:10px;">${dateStr}</p>
            </div>`;
        }
    }

    function renderStories(data, isFallback) {
        const container = document.getElementById('stories-container');
        const msgContainer = document.getElementById('daily-message');

        if (isFallback) {
            container.innerHTML += `<div style="text-align:center;padding:8px;font-size:0.85em;color:var(--gold);background:rgba(254,202,87,0.1);border-radius:8px;margin-bottom:15px;">⚡ Showing in English (translation not yet available for this language)</div>`;
        }

        let html = '';
        const featuredStories = data.featured || data.stories || [];

        featuredStories.forEach((story, i) => {
            const energy = story.energy || 0;
            const energyClass = energy >= 700 ? 'energy-high' : energy >= 500 ? 'energy-mid' : 'energy-low';
            const energyLabel = energy >= 700 ? '🔥' : energy >= 500 ? '✨' : '💫';

            html += `
            <div class="story-card">
                <div class="story-header">
                    <span class="story-location">${story.emoji || '📍'} ${story.location || ''}</span>
                    <span class="story-energy ${energyClass}">${energyLabel} ${energy}</span>
                </div>
                <span class="story-theme">${story.theme || ''}</span>
                <div class="story-body">${story.body || ''}</div>
                ${story.reflection ? `<div class="story-reflection"><strong>💫</strong> ${story.reflection}</div>` : ''}
            </div>`;
        });

        container.innerHTML += html;

        if (data.message) {
            msgContainer.innerHTML = `<p>${data.message}</p><div class="eaco-brand">EACO — ${data.brand || 'Connecting the world through positive energy'} 🌍</div>`;
            msgContainer.style.display = 'block';
        }
    }

    // ===== Archive =====
    async function loadArchive() {
        try {
            const resp = await fetch('index/index.json');
            if (!resp.ok) return;
            const archive = await resp.json();
            const grid = document.getElementById('archive-grid');
            const section = document.getElementById('archive-section');
            const dates = archive.dates || [];
            if (dates.length === 0) return;

            grid.innerHTML = dates.map(d =>
                `<a class="archive-link" href="#" onclick="event.preventDefault(); navigateToDate('${d}')">${d}</a>`
            ).join('');
            section.style.display = 'block';
        } catch (e) {}
    }

    function navigateToDate(dateStr) {
        const parts = dateStr.split('-');
        currentDate = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
        loadStories();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ===== Init =====
    renderLangBar();
    switchLang(currentLang);
    </script>
</body>
</html>

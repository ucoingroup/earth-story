    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 星空背景 */
        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(ellipse at center, #1a1e3e 0%, #0a0e27 70%);
        }
        
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            min-height: 100vh;
        }
        
        /* 左侧导航 */
        .sidebar {
            width: 240px;
            background: rgba(20, 24, 50, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            border-right: 1px solid rgba(100, 150, 255, 0.2);
        }
        
        .sidebar h2 {
            font-size: 1.2em;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .filter-btn {
            display: block;
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(100, 150, 255, 0.2);
            color: #fff;
            text-align: left;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 0.95em;
        }
        
        .filter-btn:hover {
            background: rgba(100, 150, 255, 0.2);
            border-color: rgba(100, 150, 255, 0.5);
            transform: translateX(5px);
        }
        
        .filter-btn.active {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
            border-color: #667eea;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.3);
        }
        
        /* 主内容区 */
        .main-content {
            margin-left: 240px;
            padding: 30px;
            flex: 1;
            width: calc(100% - 240px);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        
        .header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1em;
        }
        
        /* 排序控制 */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(20, 24, 50, 0.6);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        
        .sort-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s ease;
        }
        
        .sort-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .story-count {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95em;
        }
        
        /* 故事卡片网格 */
        .stories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        
        .story-card {
            background: rgba(20, 24, 50, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.4s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        .story-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            border-radius: 16px;
            opacity: 0;
            z-index: -1;
            transition: opacity 0.4s ease;
        }
        
        .story-card:hover::before {
            opacity: 1;
        }
        
        .story-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.3);
        }

            align-items: center;
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.5);

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            backdrop-filter: blur(5px);

            to { opacity: 1; }

            justify-content: center;
            align-items: center;
        }

            border: 2px solid rgba(102, 126, 234, 0.3);

            from { transform: translateY(50px); opacity: 0; }

        }

            top: 20px;
            right: 20px;
            font-size: 2em;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;

                height: auto;

            background: rgba(20, 24, 50, 0.5);

            border-radius: 10px;
        }
    </style>
</head>

    <script>
        // 星空背景动画
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        const stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2,
                alpha: Math.random(),
                delta: Math.random() * 0.02
            });
        }
        
        function animateStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            stars.forEach(star => {
                star.alpha += star.delta;
                if (star.alpha <= 0 || star.alpha >= 1) star.delta = -star.delta;
                
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                ctx.fill();
            });

        let currentFilter = '全部';
        let sortAscending = false;
        
        // 渲染故事卡片
        function renderStories(storiesToRender) {
            const grid = document.getElementById('storiesGrid');
            grid.innerHTML = '';
            
            storiesToRender.forEach(story => {
                const card = document.createElement('div');
                card.className = 'story-card';
                card.dataset.energy = story.energy;
                
                const energyPercent = (story.energy / 840 * 100).toFixed(0);
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="civilization-name">${story.civilization}</div>
                        <div class="dimension-badge">${story.dimension}</div>
                    </div>
                    <div class="energy-bar">
                        <div class="energy-label">
                            <span>⚡ 能量值</span>
                            <span>${story.energy}</span>
                        </div>
                        <div class="energy-progress">
                            <div class="energy-fill" style="width: ${energyPercent}%"></div>
                        </div>
                    </div>
                    <div class="story-preview">${story.preview}</div>
                    <div class="golden-sentence">💫 ${story.goldenSentence}</div>
                    <div class="card-footer">
                        <span>📍 ${story.location}</span>
                        <span>👁 ${story.reading} 阅读</span>
                    </div>
                `;
                
                card.addEventListener('click', () => openModal(story));
                grid.appendChild(card);
            });
            
            document.getElementById('storyCount').textContent = `共 ${storiesToRender.length} 个故事`;
        }
        
        // 筛选故事
        function filterStories(dimension) {
            if (dimension === '全部') return stories;
            return stories.filter(s => s.dimension.includes(dimension));
        }
        
        // 排序故事
        function sortStories(storiesToSort) {
            return storiesToSort.sort((a, b) => {
                return sortAscending ? a.energy - b.energy : b.energy - a.energy;
            });
        }
        
        // 打开模态框
        function openModal(story) {
            const modal = document.getElementById('storyModal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <h2>${story.id} · ${story.civilization}</h2>
                <div class="story-meta">
                    <span>📍 ${story.location}</span>
                    <span>🌀 ${story.dimension}</span>
                    <span>⚡ 能量 ${story.energy}</span>
                    <span>👁 阅读 ${story.reading}</span>
                </div>
                <div class="full-story">${story.content}</div>
                <div class="golden-sentence-full">💫 ${story.goldenSentence}</div>
            `;
            
            modal.classList.add('active');
        }
        
        // 关闭模态框
        document.getElementById('modalClose').addEventListener('click', () => {
            document.getElementById('storyModal').classList.remove('active');
        });
        
        document.getElementById('storyModal').addEventListener('click', (e) => {
            if (e.target.id === 'storyModal') {
                e.target.classList.remove('active');
            }
        });
        
        // 筛选按钮事件
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                currentFilter = btn.dataset.dimension;
                const filtered = filterStories(currentFilter);
                const sorted = sortStories(filtered);
                renderStories(sorted);
            });
        });
        
        // 排序按钮事件
        document.getElementById('sortBtn').addEventListener('click', () => {
            sortAscending = !sortAscending;
            document.getElementById('sortBtn').textContent = sortAscending ? '按能量值排序 ↑' : '按能量值排序 ↓';
            
            const filtered = filterStories(currentFilter);
            const sorted = sortStories(filtered);
            renderStories(sorted);
        });
        
        // 初始化
        const initialStories = sortStories(stories);
        renderStories(initialStories);
    </script>
